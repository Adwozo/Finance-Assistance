{% extends "base.html" %}
{% block title %}Categories · Finance Assistance{% endblock %}
{% block header %}Categories{% endblock %}

{% block content %}
<div class="grid grid-cols-1 lg:grid-cols-3 gap-4">
  <!-- Tree -->
  <div class="lg:col-span-2 bg-white rounded-xl border border-slate-200 p-4">
    <div class="font-medium mb-3">Category tree</div>
    <div id="tree" class="text-sm"></div>
  </div>

  <!-- Create -->
  <div class="bg-white rounded-xl border border-slate-200 p-4">
    <div class="font-medium mb-3">Add category</div>
    <form id="add-form" class="space-y-3 text-sm">
      <input name="name" required placeholder="Name" class="w-full border border-slate-300 rounded-md px-3 py-2">
      <select name="parent_id" class="w-full border border-slate-300 rounded-md px-3 py-2">
        <option value="">Top-level</option>
      </select>
      <div class="flex items-center gap-2">
        <label class="text-slate-500">Color</label>
        <input type="color" name="color" value="#6b7280" class="h-9 w-12 rounded border border-slate-300">
      </div>
      <button class="w-full bg-brand-500 text-white rounded-md py-2 hover:bg-brand-600">Add category</button>
    </form>
  </div>
</div>

<script>
async function loadCats() {
  const cats = await fetch('/api/categories').then(r => r.json());
  const parentSel = document.querySelector('select[name="parent_id"]');
  parentSel.innerHTML = '<option value="">Top-level</option>' +
    cats.map(c => `<option value="${c.id}">${c.name}</option>`).join('');

  // Build a simple indented list grouped by parent.
  const byParent = {};
  cats.forEach(c => { (byParent[c.parent_id] ||= []).push(c); });
  const tree = document.getElementById('tree');
  function render(parentId, depth) {
    return (byParent[parentId] || []).map(c => `
      <div class="flex items-center gap-2 py-1.5" style="padding-left:${depth*16}px">
        <span class="w-3 h-3 rounded-sm" style="background:${c.color}"></span>
        <span class="flex-1">${c.name}</span>
        <button onclick="delCat(${c.id})" class="text-xs text-slate-400 hover:text-rose-600">Delete</button>
      </div>
      ${render(c.id, depth + 1)}`.trim()).join('');
  }
  tree.innerHTML = render(null, 0) || '<div class="text-slate-400">No categories.</div>';
}

document.getElementById('add-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const fd = new FormData(e.target);
  const payload = Object.fromEntries(fd.entries());
  if (payload.parent_id === '') delete payload.parent_id;
  await fetch('/api/categories', {
    method: 'POST', headers: {'Content-Type':'application/json'},
    body: JSON.stringify(payload),
  });
  e.target.reset();
  loadCats();
});

async function delCat(id) {
  if (!confirm('Delete this category?')) return;
  await fetch(`/api/categories/${id}`, { method: 'DELETE' });
  loadCats();
}
loadCats();
</script>
{% endblock %}
