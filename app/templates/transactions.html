{% extends "base.html" %}
{% block title %}Transactions · Finance Assistance{% endblock %}
{% block header %}Transactions{% endblock %}

{% block content %}
<div class="space-y-4">
  <!-- Filters -->
  <form id="filters" class="bg-white rounded-xl border border-slate-200 p-4 grid grid-cols-1 md:grid-cols-6 gap-3 text-sm">
    <input type="date" name="start_date" class="border border-slate-300 rounded-md px-3 py-2" placeholder="Start">
    <input type="date" name="end_date" class="border border-slate-300 rounded-md px-3 py-2" placeholder="End">
    <select name="account_id" class="border border-slate-300 rounded-md px-3 py-2">
      <option value="">All accounts</option>
      {% for a in accounts %}<option value="{{ a.id }}">{{ a.name }}</option>{% endfor %}
    </select>
    <select name="category_id" id="filter-category" class="border border-slate-300 rounded-md px-3 py-2" hidden>
      <option value="">All categories</option>
    </select>
    <span id="filter-category-slot"></span>
    <select name="is_transfer" class="border border-slate-300 rounded-md px-3 py-2">
      <option value="">All rows</option>
      <option value="false">Non-transfers</option>
      <option value="true">Transfers only</option>
    </select>
    <input type="search" name="search" placeholder="Search description…" class="border border-slate-300 rounded-md px-3 py-2">
  </form>

  <div class="bg-white rounded-xl border border-slate-200 overflow-hidden">
    <table class="w-full text-sm">
      <thead class="bg-slate-50 text-slate-500 text-xs uppercase tracking-wide">
        <tr>
          <th class="text-left px-4 py-3">Date</th>
          <th class="text-left px-4 py-3">Description</th>
          <th class="text-left px-4 py-3">Account</th>
          <th class="text-left px-4 py-3">Category</th>
          <th class="text-right px-4 py-3">Amount</th>
          <th class="text-center px-4 py-3">Transfer?</th>
          <th class="px-4 py-3"></th>
        </tr>
      </thead>
      <tbody id="tx-body" class="divide-y divide-slate-100">
        <tr><td colspan="7" class="text-center text-slate-400 py-10">Loading…</td></tr>
      </tbody>
    </table>
  </div>
</div>

<script>
function fmt(n) {
  const v = Number(n || 0);
  return v.toLocaleString(undefined, { style: 'currency', currency: window.DEFAULT_CURRENCY || 'HKD' });
}

async function loadCategories() {
  // Filter picker (in the form): "All categories" empties the filter.
  const filterSlot = document.getElementById('filter-category-slot');
  window._filterPicker = window.initCategoryPicker(filterSlot, {
    value: null,
    allowEmpty: true,
    emptyLabel: 'All categories',
    onChange: () => loadTx(),
  });
}

async function loadTx() {
  const form = document.getElementById('filters');
  const params = new URLSearchParams();
  new FormData(form).forEach((v, k) => {
    if (v === '' || v == null) return;
    if (k === 'is_transfer') { params.set(k, v === 'true' ? 'true' : 'false'); return; }
    params.set(k, v);
  });
  // The category filter value comes from the picker, not the hidden select.
  const catId = window._filterPicker && window._filterPicker.value;
  if (catId) params.set('category_id', catId);

  const txs = await fetch('/api/transactions?' + params).then(r => r.json());
  const body = document.getElementById('tx-body');
  if (!txs.length) { body.innerHTML = '<tr><td colspan="7" class="text-center text-slate-400 py-10">No transactions found.</td></tr>'; return; }
  body.innerHTML = txs.map(t => `
    <tr data-id="${t.id}" ${t.is_transfer ? 'class="bg-violet-50/40"' : ''}>
      <td class="px-4 py-3 text-slate-600">${t.date}</td>
      <td class="px-4 py-3">${t.description || ''}${t.category_event ? ` <span class="ml-2 text-[10px] px-1.5 py-0.5 rounded bg-slate-100 text-slate-500" title="Converter event guess">${t.category_event}</span>` : ''}</td>
      <td class="px-4 py-3 text-slate-500">${t.account_name || '—'}</td>
      <td class="px-4 py-3">
        <span class="cat-slot" data-tx="${t.id}" data-cat="${t.category_id ?? ''}" ${t.is_transfer ? 'data-disabled="1"' : ''}></span>
      </td>
      <td class="px-4 py-3 text-right font-semibold ${t.amount < 0 ? 'text-rose-600' : 'text-emerald-600'} ${t.is_transfer ? 'opacity-60' : ''}">${fmt(t.amount)}</td>
      <td class="px-4 py-3 text-center">
        <input type="checkbox" ${t.is_transfer ? 'checked' : ''} onchange="toggleTransfer(${t.id}, this.checked)" title="Mark as transfer">
      </td>
      <td class="px-4 py-3 text-right">
        <button onclick="delTx(${t.id})" class="text-xs text-slate-400 hover:text-rose-600">Delete</button>
      </td>
    </tr>`).join('');
  // Attach a CategoryPicker to each row's slot.
  body.querySelectorAll('.cat-slot').forEach(slot => {
    const txId = Number(slot.dataset.tx);
    const picker = window.initCategoryPicker(slot, {
      value: slot.dataset.cat === '' ? null : Number(slot.dataset.cat),
      allowEmpty: true,
      emptyLabel: 'Uncategorized',
      onChange: (id) => updateCat(txId, id),
    });
    if (slot.dataset.disabled) {
      slot.querySelector('.catpicker-btn').style.opacity = '0.5';
      slot.querySelector('.catpicker-btn').style.pointerEvents = 'none';
    }
  });
}

async function updateCat(id, catId) {
  await fetch(`/api/transactions/${id}`, {
    method: 'PATCH',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ category_id: catId ? Number(catId) : null }),
  });
}

async function toggleTransfer(id, checked) {
  await fetch(`/api/transactions/${id}`, {
    method: 'PATCH',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ is_transfer: checked }),
  });
  loadTx();
}

async function delTx(id) {
  if (!confirm('Delete this transaction?')) return;
  await fetch(`/api/transactions/${id}`, { method: 'DELETE' });
  loadTx();
}

document.getElementById('filters').addEventListener('input', () => loadTx());
loadCategories().then(loadTx);
</script>
{% endblock %}
